<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shuriken Prototype</title>
<style>
  :root { --bg:#1a1d24; --panel:#fff; --ink:#2b2f38; --muted:#6b7280; --blue:#4c8dff; --line:#e3e6ec; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; background:var(--bg);
    font-family:-apple-system,"Segoe UI",Roboto,sans-serif; color:var(--ink); }
  #app { height:100%; display:flex; flex-direction:column; }

  /* ===== Topbar + tabs ===== */
  #topbar { flex:0 0 auto; height:52px; display:flex; align-items:center; justify-content:space-between;
    padding:0 16px; background:#22262f; color:#fff; }
  #topbar .brand { font-weight:700; letter-spacing:.3px; }
  .tabs { display:flex; gap:8px; }
  .tab { background:#2f3440; color:#cfd5e0; border:none; padding:8px 16px; border-radius:10px;
    font-size:14px; font-weight:600; cursor:pointer; }
  .tab.active { background:var(--blue); color:#fff; }

  /* ===== Play screen ===== */
  #playScreen { flex:1 1 auto; display:flex; flex-direction:column; align-items:center; min-height:0; }
  #playBar { flex:0 0 auto; display:flex; gap:10px; padding:10px; }
  #playBar button { border:none; border-radius:10px; padding:8px 14px; font-size:14px; font-weight:600;
    cursor:pointer; background:#2f3440; color:#cfd5e0; }
  #autoToggle.on { background:#ffb84d; color:#3a2a00; }
  #wrap { flex:1 1 auto; display:flex; align-items:center; justify-content:center; min-height:0; }
  #game { background:#f7f8fa; border-radius:14px; box-shadow:0 10px 40px rgba(0,0,0,.5);
    cursor:crosshair; touch-action:none; }

  /* ===== Edit screen ===== */
  #editScreen, #labScreen { flex:1 1 auto; overflow-y:auto; padding:18px; display:none; }
  /* Skill Lab blocks (Scratch-style) */
  .lab-block { border-radius:12px; padding:10px 12px; margin:10px 0; color:#fff; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .lab-block .lab-tag { font-weight:800; font-size:12px; letter-spacing:.5px; opacity:.9; min-width:78px; }
  .lab-block .lab-body { display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; }
  .lab-block .field span { color:#fff; }
  .blk-trigger { background:#e8842b; }
  .blk-chance  { background:#2f8de0; }
  .blk-effect  { background:#8a5cf0; }
  .lab-skill { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:6px 8px; border-bottom:1px solid var(--line); }
  .lab-skill-main { display:flex; align-items:center; gap:8px; font-size:14px; }
  .card-block { max-width:860px; margin:0 auto 18px; background:var(--panel); border-radius:14px; padding:18px 20px; }
  .card-block h2 { margin:0 0 4px; font-size:20px; }
  .card-block h3 { margin:16px 0 6px; font-size:14px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
  .row-head { display:flex; align-items:center; justify-content:space-between; }
  .hint { color:var(--muted); font-size:13px; margin:4px 0 10px; }
  .sub { font-size:13px; font-weight:600; color:var(--muted); margin:12px 0 6px; }

  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
  .field { display:flex; flex-direction:column; gap:3px; font-size:12px; color:var(--muted); }
  .field span { font-weight:600; }
  input.num, input.txt, select.sel, textarea.json {
    border:1px solid var(--line); border-radius:8px; padding:7px 9px; font-size:14px; color:var(--ink);
    background:#fbfcfe; font-family:inherit; }
  input.num { width:100%; }
  textarea.json { width:100%; resize:vertical; }

  .edit-card { border:1px solid var(--line); border-radius:12px; padding:14px; margin-top:12px; background:#fcfdff; }
  .eff-row { display:flex; flex-wrap:wrap; align-items:flex-end; gap:8px; margin:6px 0;
    padding:8px; background:#f2f5fb; border-radius:8px; }
  .eff-row .field { min-width:120px; }

  .btn-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .mini { border:none; border-radius:8px; padding:7px 12px; font-size:13px; font-weight:600;
    cursor:pointer; background:var(--blue); color:#fff; }
  .mini.danger { background:#ff5277; }
  .mini.sm { padding:6px 9px; }

  .chk-box { display:flex; flex-wrap:wrap; gap:6px; }
  .chk { display:inline-flex; align-items:center; gap:6px; font-size:13px; padding:6px 10px;
    border:1px solid var(--line); border-radius:20px; cursor:pointer; background:#fff; }
  .chk.on { border-color:var(--blue); background:#eef4ff; color:var(--blue); font-weight:600; }
  .chk input { margin:0; }

  .etable { width:100%; border-collapse:collapse; margin-top:8px; }
  .etable th, .etable td { border:1px solid var(--line); padding:6px 8px; font-size:13px; text-align:center; }
  .etable th { background:#f2f5fb; color:var(--muted); }
  .etable td input.num { text-align:center; }

  /* ===== Overlays (set / upgrade / game over) ===== */
  .overlay { position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(20,22,28,.78); backdrop-filter:blur(3px); z-index:50; }
  .overlay.show { display:flex; }
  .panel { width:min(86vw,460px); background:#fff; border-radius:18px; padding:26px 22px; text-align:center;
    box-shadow:0 12px 50px rgba(0,0,0,.4); max-height:86vh; overflow-y:auto; }
  .panel h1 { font-size:24px; margin:0 0 6px; }
  .panel p { font-size:15px; color:#5b6270; margin:0 0 18px; }
  .cards { display:flex; flex-direction:column; gap:12px; }
  .card { border:2px solid var(--line); border-radius:14px; padding:16px 18px; text-align:left;
    cursor:pointer; transition:all .15s ease; background:#fbfcfe; }
  .card:hover { border-color:var(--blue); background:#f0f6ff; transform:translateY(-2px); }
  .card .ico { font-size:24px; }
  .card .name { font-size:18px; font-weight:700; margin:4px 0 2px; }
  .card .desc { font-size:14px; color:var(--muted); line-height:1.35; }
  .card .lvl { font-size:12px; color:var(--blue); font-weight:700; margin-top:6px; }
  .card .desc .hl { font-weight:800; color:#1a1d24; background:#fff3bf; padding:0 4px; border-radius:4px; }
  .btn { margin-top:8px; background:var(--blue); color:#fff; border:none; font-size:18px; font-weight:700;
    padding:14px 28px; border-radius:12px; cursor:pointer; }
</style>
</head>
<body>
<div id="app">
  <nav id="topbar">
    <div class="brand">Shuriken Prototype</div>
    <div class="tabs">
      <button id="tabPlay" class="tab">Play</button>
      <button id="tabLab" class="tab">Skill Lab</button>
      <button id="tabEdit" class="tab">Edit + Balance</button>
    </div>
  </nav>

  <!-- ============ PLAY SCREEN ============ -->
  <div id="playScreen">
    <div id="playBar">
      <button id="autoToggle"></button>
      <button id="replayBtn">Chơi lại</button>
    </div>
    <div id="wrap"><canvas id="game"></canvas></div>
  </div>

  <!-- ============ SKILL LAB SCREEN ============ -->
  <div id="labScreen"><div id="labRoot"></div></div>

  <!-- ============ EDIT SCREEN ============ -->
  <div id="editScreen"><div id="editRoot"></div></div>
</div>

<!-- ============ OVERLAYS ============ -->
<!-- Chọn vũ khí trước trận -->
<div class="overlay" id="weaponOverlay">
  <div class="panel">
    <h1>Chọn vũ khí</h1>
    <p>Mỗi vũ khí có skill khởi đầu, passive và ultimate riêng.</p>
    <div class="cards" id="weaponCards"></div>
  </div>
</div>
<!-- Lên cấp: chọn 1 trong 3 skill -->
<div class="overlay" id="levelupOverlay">
  <div class="panel">
    <h1>Lên cấp!</h1>
    <p>Chọn 1 trong 3 kỹ năng.</p>
    <div class="cards" id="levelupCards"></div>
  </div>
</div>
<!-- Thua -->
<div class="overlay" id="gameoverOverlay">
  <div class="panel">
    <h1>Thua rồi!</h1>
    <p id="gameoverStats"></p>
    <button class="btn" id="restartBtn">Chơi lại</button>
  </div>
</div>

<!-- ============================================================
     Thứ tự nạp QUAN TRỌNG (module theo domain — kiểu dự án RPG).
     Mỗi script là toàn cục (KHÔNG dùng ES module), nên thứ tự phải đúng:

     ── Dữ liệu ──────────────────────────────────────────────
       config.js   -> BALANCE, ELEMENT_COLORS, DEFAULT_SKILLS
       data.js     -> Store (lưu/tải), helper scaling, expForLevel()

     ── Engine màn Play ──────────────────────────────────────
       canvas.js   -> VW/VH, canvas, ctx, resize()
       input.js    -> mouse + listeners (ngắm tay khi tắt auto)
       state.js    -> Game{}, state, freshPlayerStats(), initState()
       skills.js   -> skillLvl/skillCur/learnSkill + chỉ số phái sinh
       aim.js      -> findClosestEnemy(), aimAngle()
       spawn.js    -> pickEnemyType(), spawnEnemy()
       particles.js-> spawnExplosion()
       combat.js   -> fire(), makeBullet(), windGust(), bulletHit()...
       levelup.js  -> offerLevelUp() / chooseSkill() (chọn 1 trong 3)
       lifecycle.js-> gameOver(), restart(), hideOverlays()
       update.js   -> update(dt)
       render.js   -> drawEnemy(), drawBullet(), render(), drawHUD()
       loop.js     -> loop(), Game.start/stop, lastTime (cuối nhóm engine)

     ── Màn Edit ─────────────────────────────────────────────
       editor-dom.js      -> el(), numField(), txtField(), labeled()
       editor-sections.js -> renderEditor() + Balance + Dữ liệu
       nav.js             -> điều hướng tab + auto-play (nạp CUỐI CÙNG)

     ⚠ game.js / editor.js cũ giữ làm backup, KHÔNG nạp nữa.
     ============================================================ -->
<!-- Dữ liệu -->
<script src="config.js"></script>
<script src="data.js"></script>
<!-- Engine màn Play -->
<script src="canvas.js"></script>
<script src="input.js"></script>
<script src="state.js"></script>
<script src="skills.js"></script>
<script src="weapons.js"></script>
<script src="aim.js"></script>
<script src="spawn.js"></script>
<script src="particles.js"></script>
<script src="combat.js"></script>
<script src="levelup.js"></script>
<script src="lifecycle.js"></script>
<script src="update.js"></script>
<script src="render.js"></script>
<script src="loop.js"></script>
<!-- Màn Edit -->
<script src="editor-dom.js"></script>
<script src="editor-sections.js"></script>
<script src="skill-lab.js"></script>
<script src="nav.js"></script>
</body>
</html>
